{% extends "base.html" %}

{% block title %}Редактирование счета - Финансы{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Редактирование счета</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название счета</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ account.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="initial_balance" class="form-label">Начальный баланс (₽)</label>
                        <input type="number" class="form-control" id="initial_balance" name="initial_balance" 
                               step="0.01" value="{{ account.initial_balance }}">
                        <small class="text-muted">Изменение начального баланса повлияет на текущий баланс</small>
                    </div>

                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        Текущий баланс счета: <strong>{{ "%.2f"|format(account.current_balance) }} ₽</strong>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('accounts_list') }}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i>Отмена
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Сохранить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
