{% extends "base.html" %}

{% block title %}Новая регулярная транзакция - Финансы{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-sync-alt me-2"></i>
                    Новая регулярная транзакция
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('regular_transaction_create') }}">
                    
                    <!-- Тип транзакции -->
                    <div class="mb-3">
                        <label class="form-label">Тип <span class="text-danger">*</span></label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="typeExpense" value="expense" checked>
                            <label class="form-check-label" for="typeExpense">
                                <span class="badge bg-danger">Расход</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="typeIncome" value="income">
                            <label class="form-check-label" for="typeIncome">
                                <span class="badge bg-success">Доход</span>
                            </label>
                        </div>
                    </div>

                    <!-- Название -->
                    <div class="mb-3">
                        <label for="name" class="form-label">Название <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required>
                        <small class="text-muted">Например: Аренда квартиры, Зарплата</small>
                    </div>

                    <!-- Категория -->
                    <div class="mb-3">
                        <label for="category_id" class="form-label">Категория <span class="text-danger">*</span></label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="">Выберите категорию</option>
                            <optgroup label="Расходы" id="expenseCategories">
                                {% for cat in categories if cat.type == 'expense' %}
                                <option value="{{ cat.id }}" style="color: {{ cat.color }};">
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="Доходы" id="incomeCategories">
                                {% for cat in categories if cat.type == 'income' %}
                                <option value="{{ cat.id }}" style="color: {{ cat.color }};">
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </optgroup>
                        </select>
                    </div>

                    <!-- Сумма -->
                    <div class="mb-3">
                        <label for="amount" class="form-label">Сумма <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="amount" name="amount" 
                                   step="0.01" min="0.01" required>
                            <span class="input-group-text">₽</span>
                        </div>
                    </div>

                    <!-- Периодичность -->
                    <div class="mb-3">
                        <label for="frequency" class="form-label">Периодичность</label>
                        <select class="form-select" id="frequency" name="frequency">
                            <option value="daily">Ежедневно</option>
                            <option value="weekly">Еженедельно</option>
                            <option value="monthly" selected>Ежемесячно</option>
                        </select>
                    </div>

                    <!-- Даты -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="start_date" class="form-label">Дата начала</label>
                                <input type="date" class="form-control" id="start_date" name="start_date" 
                                       value="{{ today }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="end_date" class="form-label">Дата окончания (опционально)</label>
                                <input type="date" class="form-control" id="end_date" name="end_date">
                            </div>
                        </div>
                    </div>

                    <!-- Комментарий -->
                    <div class="mb-3">
                        <label for="comment" class="form-label">Комментарий</label>
                        <textarea class="form-control" id="comment" name="comment" rows="2"></textarea>
                    </div>

                    <!-- Кнопки -->
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('regular_transactions_list') }}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i>Отмена
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Сохранить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Переключение категорий при изменении типа
document.querySelectorAll('input[name="type"]').forEach(radio => {
    radio.addEventListener('change', function() {
        const expenseGroup = document.getElementById('expenseCategories');
        const incomeGroup = document.getElementById('incomeCategories');
        const select = document.getElementById('category_id');
        
        if (this.value === 'expense') {
            expenseGroup.style.display = '';
            incomeGroup.style.display = 'none';
        } else {
            expenseGroup.style.display = 'none';
            incomeGroup.style.display = '';
        }
        select.value = '';
    });
});

// Инициализация
document.getElementById('typeExpense').dispatchEvent(new Event('change'));
</script>
{% endblock %}
